spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bytik}
    username: ${SPRING_DATASOURCE_USERNAME:bytik}
    password: ${SPRING_DATASOURCE_PASSWORD:bytik_secret}
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 60000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:super-secret-jwt-key-for-bytik-2026-hackathon}
  expiration: 86400000
